{% extends 'base.html' %}

{% block content %}
<h2>Editar Outfit</h2>

<form method="POST">
    {% csrf_token %}

    Nome: <input type="text" name="nome" value="{{ outfit.nome }}"><br><br>

    <h3>Peças</h3>

    {% for p in pecas %}
        <input type="checkbox" name="pecas" value="{{ p.id }}"
        {% if p in outfit.pecas.all %}checked{% endif %}>
        {{ p.nome }} ({{ p.categoria }}) <br>
    {% endfor %}

    <br>
    <button type="submit">Guardar Alterações</button>
</form>

{% endblock %}
