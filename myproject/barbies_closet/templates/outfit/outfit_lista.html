{% extends 'base.html' %}

{% block content %}
<h2>Outfits</h2>

<a href="{% url 'criar_outfit' %}">Novo Outfit</a>

<ul>
    {% for o in outfits %}
        <li>
            <a href="{% url 'detalhe_outfit' o.id %}">
                {{ o.nome }}
            </a>
        </li>
    {% endfor %}
</ul>

{% endblock %}
