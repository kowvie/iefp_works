{% extends 'base.html' %}

{% block content %}
<h2>Criar Outfit</h2>

<form method="POST">
    {% csrf_token %}

    Nome: <input type="text" name="nome" required><br><br>

    <h3>Selecionar Peças</h3>

    {% for p in pecas %}
        <input type="checkbox" name="pecas" value="{{ p.id }}">
        {{ p.nome }} ({{ p.categoria }}) <br>
    {% endfor %}

    <br>
    <button type="submit">Guardar</button>
</form>

{% endblock %}
